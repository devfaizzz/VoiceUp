<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceUp - Sign Up</title>
    <script src="/assets/tailwind.js"></script>
    <style>
        body { background: linear-gradient(135deg, #1e40af 0%, #7c3aed 100%); }
        .auth-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="auth-card rounded-2xl shadow-2xl w-full max-w-md p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Create Account</h1>
            <p class="text-gray-500 mt-1">Join VoiceUp to report civic issues</p>
        </div>

        <form id="signupForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" id="name" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                <input type="tel" id="phone" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" required minlength="6"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>
            <button type="submit" id="signupBtn"
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 active:scale-[0.98] transition">
                Sign Up
            </button>
        </form>

        <p class="text-center text-gray-500 mt-6">
            Already have an account?
            <a href="/login.html" class="text-blue-600 font-semibold hover:underline">Login</a>
        </p>

        <div id="msg" class="mt-4 text-center text-sm hidden"></div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        if (isLoggedIn()) window.location.href = '/';

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('signupBtn');
            msg.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value.trim(),
                        email: document.getElementById('email').value.trim(),
                        phone: document.getElementById('phone').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();

                if (res.ok) {
                    saveAuth(data);
                    msg.textContent = 'Account created! Redirecting...';
                    msg.className = 'mt-4 text-center text-sm text-green-600';
                    setTimeout(() => { window.location.href = '/'; }, 600);
                } else {
                    msg.textContent = data.message || 'Registration failed';
                    msg.className = 'mt-4 text-center text-sm text-red-600';
                    btn.disabled = false;
                    btn.textContent = 'Sign Up';
                }
            } catch {
                msg.textContent = 'Server error. Try again later.';
                msg.className = 'mt-4 text-center text-sm text-red-600';
                btn.disabled = false;
                btn.textContent = 'Sign Up';
            }
        });
    </script>
</body>
</html>
