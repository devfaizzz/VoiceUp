<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceUp - Login</title>
    <script src="/assets/tailwind.js"></script>
    <style>
        body { background: linear-gradient(135deg, #1e40af 0%, #7c3aed 100%); }
        .auth-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="auth-card rounded-2xl shadow-2xl w-full max-w-md p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Welcome Back</h1>
            <p class="text-gray-500 mt-1">Login to your VoiceUp account</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>
            <button type="submit" id="loginBtn"
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 active:scale-[0.98] transition">
                Login
            </button>
        </form>

        <p class="text-center text-gray-500 mt-6">
            Don't have an account?
            <a href="/signup.html" class="text-blue-600 font-semibold hover:underline">Sign Up</a>
        </p>

        <div id="msg" class="mt-4 text-center text-sm hidden"></div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // If already logged in, redirect
        if (isLoggedIn()) {
            const u = getUser();
            window.location.href = u && u.role === 'admin' ? '/admin' : '/';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('loginBtn');
            msg.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();

                if (res.ok) {
                    saveAuth(data);
                    msg.textContent = 'Login successful! Redirecting...';
                    msg.className = 'mt-4 text-center text-sm text-green-600';
                    setTimeout(() => {
                        window.location.href = data.user.role === 'admin' ? '/admin' : '/';
                    }, 600);
                } else {
                    msg.textContent = data.message || 'Login failed';
                    msg.className = 'mt-4 text-center text-sm text-red-600';
                    btn.disabled = false;
                    btn.textContent = 'Login';
                }
            } catch {
                msg.textContent = 'Server error. Try again later.';
                msg.className = 'mt-4 text-center text-sm text-red-600';
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
